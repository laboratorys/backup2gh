name: Release Go Binary (xgo)

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  xgo-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux/amd64
          - linux/arm64
          - windows/amd64
          - windows/386
          - darwin/amd64
          - darwin/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with xgo
        uses: crazy-max/ghaction-xgo@v4
        with:
          xgo_version: latest
          go_version: "1.24"
          dest: dist
          prefix: backup2gh
          targets: ${{ matrix.target }}
          v: true
          x: false
          race: false
          ldflags: -s -w -linkmode external -extldflags "-static"
          buildmode: default
          trimpath: true

      - name: Post-Build Packaging
        run: |
          cd dist
          # 格式化目标名称 (如 linux/amd64 -> linux-amd64)
          TARGET_STR=$(echo "${{ matrix.target }}" | sed 's/\//-/g')
          
          # 查找 xgo 生成的文件
          RAW_FILE=$(ls backup2gh*)

          if [[ "${{ matrix.target }}" == windows* ]]; then
            # Windows: 重命名为简洁名并打包成 .zip
            mv "$RAW_FILE" backup2gh.exe
            zip "backup2gh-${TARGET_STR}.zip" backup2gh.exe
          else
            # Linux/Darwin: 重命名并打包成 .tar.gz
            mv "$RAW_FILE" backup2gh
            tar -czvf "backup2gh-${TARGET_STR}.tar.gz" backup2gh
          fi
          
          # 清理原始文件，只保留压缩包
          find . -maxdepth 1 -not -name "*.zip" -not -name "*.tar.gz" -type f -delete

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}