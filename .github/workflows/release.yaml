name: Release Go Binary (xgo)

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  xgo-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # xgo 的格式是 goos/goarch
        target:
          - linux/amd64
          - linux/arm64
          - windows/amd64
          - windows/386
          - darwin/amd64
          - darwin/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build with xgo
        uses: crazy-max/ghaction-xgo@v4
        with:
          xgo_version: latest
          go_version: "1.24"
          dest: dist
          prefix: backup2gh
          targets: ${{ matrix.target }}
          v: true
          x: false
          race: false
          build_tags: netgo
          ldflags: |
            -s -w
            ${{ contains(matrix.target, 'linux') && '-linkmode external -extldflags "-static"' || '' }}

      - name: Post-Build Packaging
        run: |
          cd dist
          # 将 matrix.target 中的斜杠替换为横杠 (例如 linux/amd64 -> linux-amd64)
          TARGET_STR=$(echo "${{ matrix.target }}" | sed 's/\//-/g')
          
          # 匹配 xgo 生成的原始文件 (通常类似于 backup2gh-linux-amd64)
          # 注意：xgo 对某些平台可能会生成 backup2gh-windows-4.0-386.exe 这种带版本的文件名
          RAW_FILE=$(ls backup2gh*)

          if [[ "${{ matrix.target }}" == windows* ]]; then
            # Windows 处理：重命名为简洁名并打包成 .zip
            mv "$RAW_FILE" backup2gh.exe
            zip "backup2gh-${TARGET_STR}.zip" backup2gh.exe
            echo "Generated: backup2gh-${TARGET_STR}.zip"
          else
            # Linux/Darwin 处理：重命名并打包成 .tar.gz
            mv "$RAW_FILE" backup2gh
            tar -czvf "backup2gh-${TARGET_STR}.tar.gz" backup2gh
            echo "Generated: backup2gh-${TARGET_STR}.tar.gz"
          fi
          
          # 清理：只保留压缩后的资源，防止上传重复的文件
          find . -maxdepth 1 -not -name "*.zip" -not -name "*.tar.gz" -type f -delete

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          # 只上传生成的压缩包
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}